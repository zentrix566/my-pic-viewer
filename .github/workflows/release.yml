# 自动构建 & 发布 Release
#
# 触发方式：
#   1. 推送 main 分支：构建但不发 Release，产物以 Artifacts 形式保留
#   2. 推送 v1.0.0 形 tag：构建并发布到 GitHub Release
#   3. 在 Actions 页面手动 "Run workflow"：用于测试构建
#
# 产物：
#   - my-pic-viewer_<version>_portable.exe   (绿色版单 exe，直接双击运行)
#   - my-pic-viewer_<version>_x64-setup.exe  (NSIS 安装包)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        id: tauri_build
        run: npx tauri build

      - name: 重命名绿色版 exe（带版本号）
        id: rename
        shell: pwsh
        run: |
          $json = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $ver = $json.version
          $src = 'src-tauri\target\release\my-pic-viewer.exe'
          $dst = "src-tauri\target\release\my-pic-viewer_${ver}_portable.exe"
          if (Test-Path $src) {
            Copy-Item $src $dst -Force
            Write-Output "已生成: $dst ($(Get-Item $dst).Length bytes)"
          } else {
            Write-Error "未找到 $src"
            exit 1
          }

      - name: 上传绿色版 exe（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: my-pic-viewer_portable
          path: src-tauri/target/release/my-pic-viewer_*.exe
          if-no-files-found: error

      - name: 上传 NSIS 安装包（Artifact）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: my-pic-viewer_nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # 只有推送 tag 才发布到 GitHub Release
      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: my-pic-viewer ${{ github.ref_name }}
          body: |
            ## 下载

            - **绿色版单 exe（推荐）**：`my-pic-viewer_*_portable.exe` —— 直接双击运行，无需安装
            - **NSIS 安装包**：`my-pic-viewer_*_x64-setup.exe` —— 传统安装程序

            ## 系统要求

            Windows 10 20H2+（自带 WebView2）；老系统需安装 [WebView2 Evergreen Runtime](https://developer.microsoft.com/microsoft-edge/webview2/)。

            ## 快捷键

            见 [README](https://github.com/${{ github.repository }}/blob/main/README.md#完整快捷键)。

          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/my-pic-viewer_*_portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
