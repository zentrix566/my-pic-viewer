# 自动构建 & 发布 Release
#
# 触发方式：
#   1. 推送形如 v1.0.0 的 tag：自动构建 Windows 产物并发布到 GitHub Release
#   2. 在 Actions 页面手动 "Run workflow"（用于测试构建，不会发布）
#
# 产物：
#   - my-pic-viewer_<version>_x64-setup.exe  (NSIS 安装包)
#   - my-pic-viewer_<version>_portable.exe   (绿色版单 exe，直接双击运行)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 & 发布 (tauri-action)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'my-pic-viewer ${{ github.ref_name }}'
          releaseBody: |
            ## 下载

            - **绿色版单 exe（推荐）**：`my-pic-viewer_*_portable.exe` —— 直接双击运行，无需安装
            - **NSIS 安装包**：`my-pic-viewer_*_x64-setup.exe` —— 传统安装程序

            ## 系统要求

            Windows 10 20H2+（自带 WebView2）；老系统需安装 [WebView2 Evergreen Runtime](https://developer.microsoft.com/microsoft-edge/webview2/)。

            ## 快捷键

            见 [README](https://github.com/${{ github.repository }}/blob/main/README.md#完整快捷键)。
          releaseDraft: false
          prerelease: false

      - name: 重命名并上传绿色版单 exe
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v', ''
          $src = 'src-tauri\target\release\my-pic-viewer.exe'
          $dst = "src-tauri\target\release\my-pic-viewer_${ver}_portable.exe"
          if (Test-Path $src) {
            Copy-Item $src $dst -Force
            Write-Host "已生成: $dst ($(Get-Item $dst | Select-Object -ExpandProperty Length) bytes)"
          } else {
            Write-Error "未找到 $src"
            exit 1
          }

      - name: 上传绿色版 exe 到 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/my-pic-viewer_*_portable.exe
          fail_on_unmatched_files: true
